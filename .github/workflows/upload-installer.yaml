name: Upload installer

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6
      - name: Upload installer scripts to Spaces
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET }}
          AWS_DEFAULT_REGION: sfo3
        run: |
          aws s3 cp install.sh s3://apitally-assets/cli/install.sh \
            --endpoint-url https://sfo3.digitaloceanspaces.com \
            --content-type text/plain \
            --acl public-read
          aws s3 cp install.ps1 s3://apitally-assets/cli/install.ps1 \
            --endpoint-url https://sfo3.digitaloceanspaces.com \
            --content-type text/plain \
            --acl public-read

  test:
    needs: upload
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install and verify (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://apitally.io/cli/install.sh | sh
          apitally --version
      - name: Install and verify (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          irm https://apitally.io/cli/install.ps1 | iex
          apitally --version
